name: ir-explorer-prod

services:
  db:
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql

  ollama:
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama

  backend:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    ports:
      - "8204:8000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        npm run build
        node build
    environment:
      - PORT=8000
      - ORIGIN=${ORIGIN}

volumes:
  pgdata:
  ollamadata:
